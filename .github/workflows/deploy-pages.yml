name: Deploy RV-Insights Homepage

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "web/**"
      - "README.md"
      - "README_zh.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static homepage artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
