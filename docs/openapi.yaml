  # ── Task Settings (Sprint 9) ──
  /api/v1/task-settings:
    get:
      tags: [Tasks]
      summary: Get task settings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Task settings
    put:
      tags: [Tasks]
      summary: Update task settings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Settings updated
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    # Auth schemas
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          enum: [bearer, Bearer]
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    GenericResponse:
      type: object
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
        status_code:
          type: integer
    # Case schemas
    CaseCreate:
      type: object
      required:
        - title
        - target_repo
        - input_context
      properties:
        title:
          type: string
        target_repo:
          type: string
        input_context:
          type: string
        contribution_type:
          type: string
    Case:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [created, exploring, pending_explore_review, planning, pending_plan_review, developing, reviewing, pending_code_review, testing, pending_test_review, completed, abandoned]
        target_repo:
          type: string
        input_context:
          type: string
        exploration_result:
          $ref: '#/components/schemas/ExplorationResult'
        execution_plan:
          $ref: '#/components/schemas/ExecutionPlan'
        development_result:
          $ref: '#/components/schemas/DevelopmentResult'
        review_verdict:
          $ref: '#/components/schemas/ReviewVerdict'
        test_result:
          $ref: '#/components/schemas/TestResult'
        review_iterations:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cost:
          $ref: '#/components/schemas/CostSummary'
    CaseListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Case'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
    CostSummary:
      type: object
      properties:
        total_input_tokens:
          type: integer
        total_output_tokens:
          type: integer
        estimated_cost_usd:
          type: number
    # Case-related sub-schemas
    ExplorationResult:
      type: object
      properties:
        contribution_type:
          type: string
        title:
          type: string
        summary:
          type: string
        target_repo:
          type: string
        target_files:
          type: array
          items:
            type: string
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/Evidence'
        feasibility_score:
          type: number
        estimated_complexity:
          type: string
        upstream_status:
          type: string
    Evidence:
      type: object
      properties:
        source:
          type: string
        url:
          type: string
          format: uri
        content:
          type: string
        relevance:
          type: number
    ExecutionPlan:
      type: object
      properties:
        dev_steps:
          type: array
          items:
            $ref: '#/components/schemas/DevStep'
        test_cases:
          type: array
          items:
            $ref: '#/components/schemas/TestCase'
        qemu_config:
          type: string
        estimated_tokens:
          type: integer
        risk_assessment:
          type: string
    DevStep:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        target_files:
          type: array
          items:
            type: string
        expected_changes:
          type: string
        risk_level:
          type: string
        dependencies:
          type: array
          items:
            type: string
    TestCase:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        description:
          type: string
        expected_result:
          type: string
        qemu_required:
          type: boolean
    DevelopmentResult:
      type: object
      properties:
        patch_files:
          type: array
          items:
            type: string
        changed_files:
          type: array
          items:
            type: string
        commit_message:
          type: string
        change_summary:
          type: string
        lines_added:
          type: integer
        lines_removed:
          type: integer
    ReviewVerdict:
      type: object
      properties:
        approved:
          type: boolean
        findings:
          type: array
          items:
            $ref: '#/components/schemas/ReviewFinding'
        iteration:
          type: integer
        reviewer_model:
          type: string
        summary:
          type: string
    ReviewFinding:
      type: object
      properties:
        severity:
          type: string
        category:
          type: string
        file:
          type: string
        line:
          type: integer
        description:
          type: string
        suggestion:
          type: string
    TestResult:
      type: object
      properties:
        passed:
          type: boolean
        total_tests:
          type: integer
        passed_tests:
          type: integer
        failed_tests:
          type: integer
        test_log_path:
          type: string
        coverage_percent:
          type: number
        qemu_version:
          type: string
        failure_details:
          type: array
          items:
            type: string
    # History and artifacts
    CaseHistoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CaseHistoryItem'
        total:
          type: integer
    CaseHistoryItem:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        verdict:
          $ref: '#/components/schemas/ReviewVerdict'
        summary:
          type: string
    ArtifactsResponse:
      type: object
      properties:
        stage:
          type: string
        artifacts:
          type: array
          items:
            type: string
    PipelineEvent:
      type: object
      properties:
        seq:
          type: integer
        case_id:
          type: string
        event_type:
          type: string
        data:
          type: object
        timestamp:
          type: string
          format: date-time
  # Health schema
  HealthStatus:
    type: object
    properties:
      mongodb:
        type: string
      postgres:
        type: string
      redis:
        type: string
    # ── Sprint 3+ schemas ──
    ChatRequest:
      type: object
      properties:
        message:
          type: string
        timestamp:
          type: integer
        event_id:
          type: string
        attachments:
          type: array
          items:
            type: string
        language:
          type: string
          enum: [zh, en]
        model_config_id:
          type: string
    CreateModelRequest:
      type: object
      required: [name, model_name]
      properties:
        name:
          type: string
        provider:
          type: string
          default: openai
        base_url:
          type: string
        api_key:
          type: string
        model_name:
          type: string
        context_window:
          type: integer
          minimum: 1024
          maximum: 10000000
    ModelConfig:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
        base_url:
          type: string
        api_key:
          type: string
        model_name:
          type: string
        context_window:
          type: integer
        is_system:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: integer
        updated_at:
          type: integer
