<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RV-Insights RISC-V Expert Q&amp;A Concept Preview</title>
  <desc id="desc">Concept preview artwork for a future RISC-V Expert Q and A video with a light technology style and red-blue emphasis.</desc>
  <defs>
    <linearGradient id="bg" x1="180" y1="80" x2="1440" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.55" stop-color="#F4F7FC"/>
      <stop offset="1" stop-color="#EEF3FA"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1210 220) rotate(90) scale(260 360)">
      <stop offset="0" stop-color="#8CC8FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#8CC8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRed" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(390 700) rotate(90) scale(220 320)">
      <stop offset="0" stop-color="#FF8B8B" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#FF8B8B" stop-opacity="0"/>
