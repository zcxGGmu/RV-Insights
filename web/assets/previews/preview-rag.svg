    <linearGradient id="panel" x1="182" y1="132" x2="1418" y2="768" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#F5F8FD" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="flow" x1="482" y1="536" x2="1186" y2="536" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6A5E"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="180" y="120" width="1240" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#8EA6C4" flood-opacity="0.18"/>
    </filter>
  </defs>

