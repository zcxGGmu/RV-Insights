<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RV-Insights Private Knowledge Retrieval Concept Preview</title>
  <desc id="desc">Concept preview artwork for a future private knowledge retrieval video with light technology motifs and red-blue highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="70" x2="1450" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.58" stop-color="#F4F7FC"/>
      <stop offset="1" stop-color="#EEF3FA"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1190 260) rotate(90) scale(270 360)">
      <stop offset="0" stop-color="#8CC8FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#8CC8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRed" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(460 720) rotate(90) scale(240 340)">
      <stop offset="0" stop-color="#FF9790" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#FF9790" stop-opacity="0"/>
