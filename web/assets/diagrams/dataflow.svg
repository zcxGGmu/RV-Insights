<svg width="1400" height="500" viewBox="0 0 1400 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="df-title df-desc">
  <title id="df-title">RV-Insights Cross-Agent Data Flow</title>
  <desc id="df-desc">Data contracts flowing between agents: InputContext through ExplorationResult, ExecutionPlan, DevelopmentResult, ReviewVerdict, to TestResult.</desc>
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFDFF"/><stop offset=".58" stop-color="#F4F7FC"/><stop offset="1" stop-color="#EDF3FA"/>
    </linearGradient>
    <linearGradient id="dpanel" x1="30" y1="20" x2="1370" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF" stop-opacity=".98"/><stop offset="1" stop-color="#F8FAFD" stop-opacity=".97"/>
    </linearGradient>
    <linearGradient id="darrow" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FF6A5E"/><stop offset="1" stop-color="#3B82F6"/></linearGradient>
    <filter id="dshadow" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#93A9C2" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1400" height="500" rx="28" fill="url(#dbg)"/>
  <g filter="url(#dshadow)"><rect x="30" y="20" width="1340" height="460" rx="26" fill="url(#dpanel)" stroke="#DCE7F4"/></g>

  <text x="70" y="64" fill="#0F172A" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="700">Data Flow / 数据流</text>
  <text x="70" y="90" fill="#506178" font-family="Arial,Helvetica,sans-serif" font-size="17">Cross-agent data contracts via Pydantic models — the only communication protocol</text>

  <!-- InputContext -->
  <rect x="56" y="130" width="170" height="140" rx="20" fill="#FFF" stroke="#D9E4F1"/>
  <rect x="56" y="130" width="170" height="6" rx="3" fill="#94A3B8"/>
  <text x="80" y="166" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700">InputContext</text>
  <text x="80" y="186" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">source: InputSource</text>
  <text x="80" y="202" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">raw_content: str</text>
  <text x="80" y="218" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">repo_url: str</text>
  <text x="80" y="234" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">priority: str</text>
  <text x="80" y="256" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="11">用户输入 / 外部事件</text>

  <!-- ExplorationResult -->
  <rect x="270" y="130" width="180" height="140" rx="20" fill="#FFF" stroke="#D0E2FF"/>
  <rect x="270" y="130" width="180" height="6" rx="3" fill="#3B82F6"/>
  <text x="294" y="166" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">ExplorationResult</text>
  <text x="294" y="186" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">feasibility_score: float</text>
  <text x="294" y="202" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">evidence: [EvidenceItem]</text>
  <text x="294" y="218" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">affected_files: [str]</text>
  <text x="294" y="234" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">risk_level: str</text>
  <text x="294" y="256" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">Explorer → Planner</text>

  <!-- ExecutionPlan -->
  <rect x="494" y="130" width="180" height="140" rx="20" fill="#FFF" stroke="#D0E2FF"/>
  <rect x="494" y="130" width="180" height="6" rx="3" fill="#3B82F6"/>
  <text x="518" y="166" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">ExecutionPlan</text>
  <text x="518" y="186" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">dev_plan: DevPlan</text>
  <text x="518" y="202" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">test_plan: TestPlan</text>
  <text x="518" y="218" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">risk_assessment: Risk</text>
  <text x="518" y="234" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">estimated_iterations: int</text>
  <text x="518" y="256" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">Planner → Developer</text>

  <!-- DevelopmentResult -->
  <rect x="718" y="130" width="180" height="140" rx="20" fill="#FFF" stroke="#FFD6D1"/>
  <rect x="718" y="130" width="180" height="6" rx="3" fill="#D9483B"/>
  <text x="738" y="166" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">DevelopmentResult</text>
  <text x="738" y="186" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">patch: str (unified diff)</text>
  <text x="738" y="202" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">changed_files: [File]</text>
  <text x="738" y="218" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">build_result: Build</text>
  <text x="738" y="234" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">iterations: int</text>
  <text x="738" y="256" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">Developer → Reviewer</text>

  <!-- ReviewVerdict -->
  <rect x="942" y="130" width="180" height="140" rx="20" fill="#FFF" stroke="#D0E2FF"/>
  <rect x="942" y="130" width="180" height="6" rx="3" fill="#3B82F6"/>
  <text x="966" y="166" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">ReviewVerdict</text>
  <text x="966" y="186" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">approved: bool</text>
  <text x="966" y="202" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">findings: [Finding]</text>
  <text x="966" y="218" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">critical_count: int</text>
  <text x="966" y="234" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">confidence: float</text>
  <text x="966" y="256" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">Reviewer → Developer/Tester</text>

  <!-- TestResult -->
  <rect x="1166" y="130" width="180" height="140" rx="20" fill="#FFF" stroke="#FFD6D1"/>
  <rect x="1166" y="130" width="180" height="6" rx="3" fill="#D9483B"/>
  <text x="1190" y="166" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">TestResult</text>
  <text x="1190" y="186" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">overall_passed: bool</text>
  <text x="1190" y="202" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">case_results: [Case]</text>
  <text x="1190" y="218" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">pass_rate: float</text>
  <text x="1190" y="234" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="11">log_archive_path: str</text>
  <text x="1190" y="256" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">Tester → 贡献就绪</text>

  <!-- Forward arrows -->
  <path d="M226 200H270" stroke="url(#darrow)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="266,194 278,200 266,206" fill="#3B82F6"/>
  <path d="M450 200H494" stroke="url(#darrow)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="490,194 502,200 490,206" fill="#3B82F6"/>
  <path d="M674 200H718" stroke="url(#darrow)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="714,194 726,200 714,206" fill="#D9483B"/>
  <path d="M898 200H942" stroke="url(#darrow)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="938,194 950,200 938,206" fill="#3B82F6"/>
  <path d="M1122 200H1166" stroke="url(#darrow)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="1162,194 1174,200 1162,206" fill="#D9483B"/>

  <!-- Iteration loop: ReviewVerdict (approved=false) back to Developer -->
  <path d="M1032 270 C1032 340 808 340 808 270" stroke="#A7B9CD" stroke-width="3" stroke-dasharray="8 6" fill="none"/>
  <polygon points="808,276 802,264 814,264" fill="#D9483B"/>
  <text x="920" y="330" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">approved = false</text>
  <text x="920" y="348" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="11" text-anchor="middle">迭代修复 / Iterate</text>

  <!-- Approved=true label -->
  <text x="1080" y="178" fill="#16A34A" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">approved = true</text>

  <!-- Agent labels below -->
  <text x="141" y="300" fill="#94A3B8" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">Input</text>
  <rect x="310" y="380" width="90" height="28" rx="14" fill="#EEF5FF" stroke="#D0E2FF"/>
  <text x="355" y="399" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Explorer</text>
  <rect x="534" y="380" width="90" height="28" rx="14" fill="#EEF5FF" stroke="#D0E2FF"/>
  <text x="579" y="399" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Planner</text>
  <rect x="758" y="380" width="100" height="28" rx="14" fill="#FFF1EF" stroke="#FFD6D1"/>
  <text x="808" y="399" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Developer</text>
  <rect x="982" y="380" width="100" height="28" rx="14" fill="#EEF5FF" stroke="#D0E2FF"/>
  <text x="1032" y="399" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Reviewer</text>
  <rect x="1206" y="380" width="90" height="28" rx="14" fill="#FFF1EF" stroke="#FFD6D1"/>
  <text x="1251" y="399" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Tester</text>

  <!-- Vertical lines from data to agent labels -->
  <path d="M355 270V380" stroke="#D0E2FF" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M579 270V380" stroke="#D0E2FF" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M808 270V380" stroke="#FFD6D1" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M1032 270V380" stroke="#D0E2FF" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M1251 270V380" stroke="#FFD6D1" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Legend -->
  <rect x="56" y="430" width="16" height="16" rx="4" fill="#EEF5FF" stroke="#D0E2FF"/>
  <text x="80" y="443" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">OpenAI Agents SDK</text>
  <rect x="210" y="430" width="16" height="16" rx="4" fill="#FFF1EF" stroke="#FFD6D1"/>
  <text x="234" y="443" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">Claude Agent SDK</text>
  <text x="400" y="443" fill="#94A3B8" font-family="Arial,Helvetica,sans-serif" font-size="12">All contracts are Pydantic BaseModel subclasses, serialized as JSON</text>
</svg>