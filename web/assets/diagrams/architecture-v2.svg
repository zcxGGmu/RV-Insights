<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">RV-Insights v2.2 System Architecture</title>
  <desc id="arch-desc">Four-layer architecture: User Interface, Orchestration, Agent Capabilities (dual SDK), and Tools/Infrastructure.</desc>
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1400" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFDFF"/><stop offset=".5" stop-color="#F4F7FC"/><stop offset="1" stop-color="#EDF3FA"/>
    </linearGradient>
    <linearGradient id="apanel" x1="30" y1="20" x2="1370" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF" stop-opacity=".98"/><stop offset="1" stop-color="#F8FAFD" stop-opacity=".97"/>
    </linearGradient>
    <linearGradient id="ablue" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="ared" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#D9483B"/><stop offset="1" stop-color="#FF6A5E"/></linearGradient>
    <linearGradient id="apurple" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7C3AED"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
    <linearGradient id="agreen" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#34D399"/></linearGradient>
    <linearGradient id="aorange" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#EA580C"/><stop offset="1" stop-color="#FB923C"/></linearGradient>
    <radialGradient id="aglow1" cx=".15" cy=".2" r=".5"><stop offset="0" stop-color="#9BCBFF" stop-opacity=".18"/><stop offset="1" stop-color="#9BCBFF" stop-opacity="0"/></radialGradient>
    <radialGradient id="aglow2" cx=".85" cy=".8" r=".5"><stop offset="0" stop-color="#FF9C97" stop-opacity=".14"/><stop offset="1" stop-color="#FF9C97" stop-opacity="0"/></radialGradient>
    <filter id="ashadow" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#93A9C2" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1400" height="920" rx="28" fill="url(#abg)"/>
  <rect width="1400" height="920" rx="28" fill="url(#aglow1)"/>
  <rect width="1400" height="920" rx="28" fill="url(#aglow2)"/>
  <g filter="url(#ashadow)"><rect x="30" y="20" width="1340" height="880" rx="26" fill="url(#apanel)" stroke="#DCE7F4"/></g>

  <text x="700" y="66" fill="#0F172A" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="700" text-anchor="middle">System Architecture / 系统架构</text>
  <text x="700" y="94" fill="#506178" font-family="Arial,Helvetica,sans-serif" font-size="17" text-anchor="middle">Four-layer architecture with dual SDK agent capabilities and human review gates</text>

  <!-- LAYER 1: User Interface -->
  <rect x="56" y="118" width="1288" height="100" rx="20" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="56" y="118" width="1288" height="6" rx="3" fill="url(#agreen)"/>
  <text x="700" y="148" fill="#059669" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" text-anchor="middle">LAYER 1: USER INTERFACE / 用户交互层</text>

  <rect x="250" y="160" width="280" height="44" rx="12" fill="#FFF" stroke="#BBF7D0"/>
  <text x="390" y="187" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Web Console (审核/干预)</text>

  <rect x="560" y="160" width="220" height="44" rx="12" fill="#FFF" stroke="#BBF7D0"/>
  <text x="670" y="187" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" text-anchor="middle">CLI 入口 (开发者)</text>

  <rect x="810" y="160" width="340" height="44" rx="12" fill="#FFF" stroke="#BBF7D0"/>
  <text x="980" y="187" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" text-anchor="middle">API Gateway (FastAPI + SSE 事件流)</text>

  <!-- LAYER 2: Orchestration -->
  <rect x="56" y="234" width="1288" height="200" rx="20" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="56" y="234" width="1288" height="6" rx="3" fill="url(#apurple)"/>
  <text x="700" y="264" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" text-anchor="middle">LAYER 2: ORCHESTRATION / 编排与状态管理层</text>

  <!-- Pipeline State Machine -->
  <rect x="80" y="280" width="920" height="60" rx="14" fill="#FFF" stroke="#DDD6FE"/>
  <text x="540" y="306" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Pipeline State Machine</text>

  <!-- State flow inside -->
  <rect x="272" y="288" width="90" height="28" rx="8" fill="#EEF5FF" stroke="#D0E2FF"/>
  <text x="292" y="307" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">EXPLORING</text>
  <text x="366" y="307" fill="#A78BFA" font-family="Arial,Helvetica,sans-serif" font-size="14">→</text>
  <rect x="382" y="288" width="86" height="28" rx="8" fill="#EEF5FF" stroke="#D0E2FF"/>
  <text x="400" y="307" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">PLANNING</text>
  <text x="472" y="307" fill="#A78BFA" font-family="Arial,Helvetica,sans-serif" font-size="14">→</text>
  <rect x="488" y="288" width="106" height="28" rx="8" fill="#FFF1EF" stroke="#FFD6D1"/>
  <text x="500" y="307" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">DEVELOPING</text>
  <text x="598" y="307" fill="#A78BFA" font-family="Arial,Helvetica,sans-serif" font-size="14">⇄</text>
  <rect x="612" y="288" width="96" height="28" rx="8" fill="#EEF5FF" stroke="#D0E2FF"/>
  <text x="626" y="307" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">REVIEWING</text>
  <text x="712" y="307" fill="#A78BFA" font-family="Arial,Helvetica,sans-serif" font-size="14">→</text>
  <rect x="728" y="288" width="80" height="28" rx="8" fill="#FFF1EF" stroke="#FFD6D1"/>
  <text x="744" y="307" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600">TESTING</text>

  <!-- Human review gates -->
  <text x="540" y="330" fill="#6D28D9" font-family="Arial,Helvetica,sans-serif" font-size="11" text-anchor="middle">每阶段间设有 [人工审核] 门禁 / Human Review Gates between each phase</text>

  <!-- Orchestration services -->
  <rect x="200" y="352" width="240" height="44" rx="12" fill="#FFF" stroke="#DDD6FE"/>
  <text x="320" y="379" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Human Gate Service (审批/驳回)</text>

  <rect x="460" y="352" width="220" height="44" rx="12" fill="#FFF" stroke="#DDD6FE"/>
  <text x="570" y="379" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Audit Logger (全链路审计)</text>

  <rect x="700" y="352" width="240" height="44" rx="12" fill="#FFF" stroke="#DDD6FE"/>
  <text x="820" y="379" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Session Store (PostgreSQL/Redis)</text>

  <rect x="960" y="352" width="240" height="44" rx="12" fill="#FFF" stroke="#DDD6FE"/>
  <text x="1080" y="379" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Resource Scheduler (并发控制)</text>

  <!-- Pydantic contracts -->
  <rect x="1020" y="280" width="310" height="60" rx="14" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="1040" y="302" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700">Pydantic Data Contracts</text>
  <text x="1040" y="320" fill="#7C3AED" font-family="Arial,Helvetica,sans-serif" font-size="11">ExplorationResult → ExecutionPlan</text>
  <text x="1040" y="334" fill="#7C3AED" font-family="Arial,Helvetica,sans-serif" font-size="11">→ DevelopmentResult → ReviewVerdict → TestResult</text>

  <!-- LAYER 3: Agent Capabilities -->
  <rect x="56" y="450" width="1288" height="240" rx="20" fill="#FAFBFF" stroke="#DCE7F4" stroke-width="1.5"/>
  <text x="700" y="478" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" text-anchor="middle">LAYER 3: AGENT CAPABILITIES / Agent 能力层</text>

  <!-- OpenAI Agents SDK panel -->
  <rect x="80" y="494" width="580" height="180" rx="18" fill="#F0F7FF" stroke="#BFDBFE"/>
  <rect x="80" y="494" width="580" height="6" rx="3" fill="url(#ablue)"/>
  <text x="104" y="522" fill="#1D4ED8" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">OpenAI Agents SDK</text>
  <text x="300" y="522" fill="#3B82F6" font-family="Arial,Helvetica,sans-serif" font-size="12">Library-native · HTTP API · Lightweight</text>

  <!-- Explorer -->
  <rect x="100" y="536" width="170" height="60" rx="12" fill="#FFF" stroke="#D0E2FF"/>
  <text x="120" y="558" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700">Explorer Agent</text>
  <text x="120" y="576" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="11">Handoff · Guardrails</text>
  <text x="120" y="590" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="10">GPT-4o</text>

  <!-- Planner -->
  <rect x="284" y="536" width="170" height="60" rx="12" fill="#FFF" stroke="#D0E2FF"/>
  <text x="304" y="558" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700">Planner Agent</text>
  <text x="304" y="576" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="11">结构化输出 · Guardrails</text>
  <text x="304" y="590" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="10">o3-mini</text>

  <!-- Reviewer -->
  <rect x="468" y="536" width="178" height="60" rx="12" fill="#FFF" stroke="#D0E2FF"/>
  <text x="488" y="558" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700">Reviewer Agent</text>
  <text x="488" y="576" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="11">Codex · Handoff · Tracing</text>
  <text x="488" y="590" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="10">GPT-4o / Codex</text>

  <!-- OpenAI features -->
  <rect x="100" y="608" width="546" height="28" rx="8" fill="#EEF5FF"/>
  <text x="120" y="627" fill="#3B82F6" font-family="Arial,Helvetica,sans-serif" font-size="11">Features: Handoff 编排 · Guardrails 校验 · Tracing 追踪 · Custom Model Provider · 结构化输出</text>

  <!-- Claude Agent SDK panel -->
  <rect x="684" y="494" width="646" height="180" rx="18" fill="#FFF5F4" stroke="#FECACA"/>
  <rect x="684" y="494" width="646" height="6" rx="3" fill="url(#ared)"/>
  <text x="708" y="522" fill="#B91C1C" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">Claude Agent SDK</text>
  <text x="900" y="522" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="12">Subprocess · stdin/stdout JSON · Built-in tools</text>

  <!-- Developer -->
  <rect x="704" y="536" width="300" height="60" rx="12" fill="#FFF" stroke="#FFD6D1"/>
  <text x="724" y="558" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700">Developer Agent (Claude Code CLI)</text>
  <text x="724" y="576" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="11">Read/Write/Edit/Bash · MCP · can_use_tool</text>
  <text x="724" y="590" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="10">Claude Opus 4.6</text>

  <!-- Tester -->
  <rect x="1018" y="536" width="298" height="60" rx="12" fill="#FFF" stroke="#FFD6D1"/>
  <text x="1038" y="558" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700">Tester Agent (Claude Code CLI)</text>
  <text x="1038" y="576" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="11">Bash 执行 · Read 解析 · 沙箱隔离</text>
  <text x="1038" y="590" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="10">Claude Sonnet 4.6</text>

  <!-- Claude features -->
  <rect x="704" y="608" width="612" height="28" rx="8" fill="#FFF1EF"/>
  <text x="724" y="627" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="11">Features: 内置工具集 · MCP 原生支持 · SessionStore 持久化 · 沙箱隔离 · Thinking 模式</text>

  <!-- Divider label -->
  <text x="670" y="570" fill="#94A3B8" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">|</text>

  <!-- LAYER 4: Tools & Infrastructure -->
  <rect x="56" y="706" width="1288" height="180" rx="20" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <rect x="56" y="706" width="1288" height="6" rx="3" fill="url(#aorange)"/>
  <text x="700" y="736" fill="#C2410C" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" text-anchor="middle">LAYER 4: TOOLS &amp; INFRASTRUCTURE / 工具与基础设施层</text>

  <!-- MCP Servers row -->
  <text x="700" y="764" fill="#EA580C" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">MCP Servers</text>
  <rect x="254" y="774" width="200" height="38" rx="10" fill="#FFF" stroke="#FED7AA"/>
  <text x="354" y="798" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">邮件列表检索 / Mail List</text>
  <rect x="478" y="774" width="200" height="38" rx="10" fill="#FFF" stroke="#FED7AA"/>
  <text x="578" y="798" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">代码库工具 / Code Tools</text>
  <rect x="702" y="774" width="220" height="38" rx="10" fill="#FFF" stroke="#FED7AA"/>
  <text x="812" y="798" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">RISC-V 知识库 / Knowledge</text>
  <rect x="946" y="774" width="200" height="38" rx="10" fill="#FFF" stroke="#FED7AA"/>
  <text x="1046" y="798" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">测试框架 / Test Framework</text>

  <!-- Infrastructure row -->
  <text x="700" y="836" fill="#EA580C" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Infrastructure</text>
  <rect x="254" y="846" width="200" height="38" rx="10" fill="#172338" stroke="#31425F"/>
  <text x="354" y="870" fill="#F3F7FB" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">PostgreSQL (状态/审计)</text>
  <rect x="478" y="846" width="200" height="38" rx="10" fill="#172338" stroke="#31425F"/>
  <text x="578" y="870" fill="#F3F7FB" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">Redis (缓存/队列)</text>
  <rect x="702" y="846" width="220" height="38" rx="10" fill="#172338" stroke="#31425F"/>
  <text x="812" y="870" fill="#F3F7FB" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">MinIO/S3 (产物存储)</text>
  <rect x="946" y="846" width="200" height="38" rx="10" fill="#172338" stroke="#31425F"/>
  <text x="1046" y="870" fill="#F3F7FB" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">Vector DB (RAG 检索)</text>

  <!-- Vertical connection arrows between layers -->
  <path d="M500 218V234" stroke="#86EFAC" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M500 434V450" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M500 690V706" stroke="#FED7AA" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M900 218V234" stroke="#86EFAC" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M900 434V450" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="4 3"/>
  <path d="M900 690V706" stroke="#FED7AA" stroke-width="2" stroke-dasharray="4 3"/>
</svg>