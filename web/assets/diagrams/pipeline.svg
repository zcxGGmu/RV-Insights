<svg width="1400" height="600" viewBox="0 0 1400 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pipe-title pipe-desc">
  <title id="pipe-title">RV-Insights 5-Agent Pipeline</title>
  <desc id="pipe-desc">Five-stage agent pipeline with human review gates: Explorer, Planner, Developer-Reviewer iteration, and Tester.</desc>
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1400" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFDFF"/><stop offset=".58" stop-color="#F4F7FC"/><stop offset="1" stop-color="#EDF3FA"/>
    </linearGradient>
    <linearGradient id="ppanel" x1="40" y1="30" x2="1360" y2="570" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF" stop-opacity=".98"/><stop offset="1" stop-color="#F8FAFD" stop-opacity=".97"/>
    </linearGradient>
    <linearGradient id="pblue" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="pred" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#D9483B"/><stop offset="1" stop-color="#FF6A5E"/></linearGradient>
    <linearGradient id="pgreen" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#16A34A"/><stop offset="1" stop-color="#4ADE80"/></linearGradient>
    <linearGradient id="parrow" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FF6A5E"/><stop offset="1" stop-color="#3B82F6"/></linearGradient>
    <radialGradient id="pglow1" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#9BCBFF" stop-opacity=".2"/><stop offset="1" stop-color="#9BCBFF" stop-opacity="0"/></radialGradient>
    <radialGradient id="pglow2" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#FF9C97" stop-opacity=".18"/><stop offset="1" stop-color="#FF9C97" stop-opacity="0"/></radialGradient>
    <filter id="pshadow" x="20" y="14" width="1360" height="572" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#93A9C2" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1400" height="600" rx="28" fill="url(#pbg)"/>
  <ellipse cx="300" cy="300" rx="300" ry="250" fill="url(#pglow2)"/>
  <ellipse cx="1100" cy="300" rx="300" ry="250" fill="url(#pglow1)"/>
  <g filter="url(#pshadow)"><rect x="30" y="24" width="1340" height="552" rx="26" fill="url(#ppanel)" stroke="#DCE7F4"/></g>

  <text x="70" y="72" fill="#0F172A" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="700">Agent Pipeline / Agent 流水线</text>
  <text x="70" y="100" fill="#506178" font-family="Arial,Helvetica,sans-serif" font-size="17">From discovery to contribution-ready artifacts with human review at every stage</text>

  <!-- SDK Labels -->
  <rect x="70" y="116" width="160" height="28" rx="14" fill="#EEF5FF" stroke="#D0E2FF"/>
  <text x="96" y="135" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">OpenAI Agents SDK</text>
  <rect x="240" y="116" width="150" height="28" rx="14" fill="#FFF1EF" stroke="#FFD6D1"/>
  <text x="262" y="135" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">Claude Agent SDK</text>

  <!-- Agent Nodes Row - Y=200 center -->
  <!-- Explorer -->
  <rect x="56" y="170" width="180" height="160" rx="24" fill="#FFF" stroke="#D0E2FF" stroke-width="2"/>
  <rect x="56" y="170" width="180" height="6" rx="3" fill="url(#pblue)"/>
  <circle cx="146" cy="216" r="22" fill="#EEF5FF" stroke="#CDE0FF"/>
  <text x="138" y="222" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">E</text>
  <text x="88" y="260" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">Explorer</text>
  <text x="88" y="280" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="13">探索 Agent</text>
  <text x="88" y="300" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">GPT-4o · Handoff</text>
  <text x="88" y="316" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">邮件列表 + 代码分析</text>

  <!-- Planner -->
  <rect x="310" y="170" width="180" height="160" rx="24" fill="#FFF" stroke="#D0E2FF" stroke-width="2"/>
  <rect x="310" y="170" width="180" height="6" rx="3" fill="url(#pblue)"/>
  <circle cx="400" cy="216" r="22" fill="#EEF5FF" stroke="#CDE0FF"/>
  <text x="393" y="222" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">P</text>
  <text x="342" y="260" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">Planner</text>
  <text x="342" y="280" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="13">规划 Agent</text>
  <text x="342" y="300" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">o3-mini · Guardrails</text>
  <text x="342" y="316" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">开发方案 + 测试方案</text>

  <!-- Developer -->
  <rect x="564" y="170" width="200" height="160" rx="24" fill="#FFF" stroke="#FFD6D1" stroke-width="2"/>
  <rect x="564" y="170" width="200" height="6" rx="3" fill="url(#pred)"/>
  <circle cx="664" cy="216" r="22" fill="#FFF1EF" stroke="#FFD2CC"/>
  <text x="657" y="222" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">D</text>
  <text x="596" y="260" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">Developer</text>
  <text x="596" y="280" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="13">开发 Agent</text>
  <text x="596" y="300" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">Claude Opus 4.6</text>
  <text x="596" y="316" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">Read/Write/Edit/Bash</text>

  <!-- Reviewer -->
  <rect x="838" y="170" width="200" height="160" rx="24" fill="#FFF" stroke="#D0E2FF" stroke-width="2"/>
  <rect x="838" y="170" width="200" height="6" rx="3" fill="url(#pblue)"/>
  <circle cx="938" cy="216" r="22" fill="#EEF5FF" stroke="#CDE0FF"/>
  <text x="932" y="222" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">R</text>
  <text x="870" y="260" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">Reviewer</text>
  <text x="870" y="280" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="13">审核 Agent</text>
  <text x="870" y="300" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">Codex · Guardrails</text>
  <text x="870" y="316" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">安全 + 正确性 + 风格</text>

  <!-- Tester -->
  <rect x="1112" y="170" width="200" height="160" rx="24" fill="#FFF" stroke="#FFD6D1" stroke-width="2"/>
  <rect x="1112" y="170" width="200" height="6" rx="3" fill="url(#pred)"/>
  <circle cx="1212" cy="216" r="22" fill="#FFF1EF" stroke="#FFD2CC"/>
  <text x="1205" y="222" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">T</text>
  <text x="1144" y="260" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700">Tester</text>
  <text x="1144" y="280" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="13">测试 Agent</text>
  <text x="1144" y="300" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">Claude Sonnet 4.6</text>
  <text x="1144" y="316" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">QEMU + 沙箱隔离</text>

  <!-- Arrows between agents -->
  <path d="M236 250H310" stroke="url(#parrow)" stroke-width="6" stroke-linecap="round"/>
  <polygon points="306,244 318,250 306,256" fill="#3B82F6"/>
  <path d="M490 250H564" stroke="url(#parrow)" stroke-width="6" stroke-linecap="round"/>
  <polygon points="560,244 572,250 560,256" fill="#D9483B"/>

  <!-- Developer-Reviewer iteration loop -->
  <path d="M764 240H838" stroke="url(#parrow)" stroke-width="6" stroke-linecap="round"/>
  <polygon points="834,234 846,240 834,246" fill="#2563EB"/>
  <path d="M938 330 C938 380 664 380 664 330" stroke="#A7B9CD" stroke-width="3" stroke-dasharray="8 6" fill="none"/>
  <polygon points="664,336 658,324 670,324" fill="#D9483B"/>
  <text x="760" y="396" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">迭代修复 / Iteration Loop</text>

  <!-- Arrow from Reviewer to Tester -->
  <path d="M1038 250H1112" stroke="url(#parrow)" stroke-width="6" stroke-linecap="round"/>
  <polygon points="1108,244 1120,250 1108,256" fill="#D9483B"/>

  <!-- Human Review Gates Row - Y=440 -->
  <rect x="240" y="430" width="56" height="56" rx="28" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="256" y="464" fill="#16A34A" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700">✓</text>
  <text x="218" y="510" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">人工审核</text>

  <rect x="496" y="430" width="56" height="56" rx="28" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="512" y="464" fill="#16A34A" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700">✓</text>
  <text x="474" y="510" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">人工审核</text>

  <rect x="1042" y="430" width="56" height="56" rx="28" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="1058" y="464" fill="#16A34A" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700">✓</text>
  <text x="1020" y="510" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">人工审核</text>

  <!-- Vertical connectors from agents to gates -->
  <path d="M268 330V430" stroke="#86EFAC" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M524 330V430" stroke="#86EFAC" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M1070 330V430" stroke="#86EFAC" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Final output -->
  <rect x="1112" y="430" width="200" height="56" rx="28" fill="#172338" stroke="#31425F"/>
  <text x="1148" y="462" fill="#F3F7FB" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700">贡献就绪产物</text>
  <text x="1148" y="480" fill="#9BCBFF" font-family="Arial,Helvetica,sans-serif" font-size="11">Contribution-Ready</text>

  <path d="M1212 330V430" stroke="#A7B9CD" stroke-width="2" stroke-dasharray="6 4"/>
</svg>