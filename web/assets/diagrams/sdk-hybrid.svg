<svg width="1400" height="700" viewBox="0 0 1400 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sdk-title sdk-desc">
  <title id="sdk-title">RV-Insights Dual SDK Hybrid Architecture</title>
  <desc id="sdk-desc">Shows how OpenAI Agents SDK and Claude Agent SDK work together through a Python orchestration layer.</desc>
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1400" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFDFF"/><stop offset=".58" stop-color="#F4F7FC"/><stop offset="1" stop-color="#EDF3FA"/>
    </linearGradient>
    <linearGradient id="spanel" x1="30" y1="24" x2="1370" y2="676" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF" stop-opacity=".98"/><stop offset="1" stop-color="#F8FAFD" stop-opacity=".97"/>
    </linearGradient>
    <linearGradient id="sblue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#60A5FA"/></linearGradient>
    <linearGradient id="sred" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#D9483B"/><stop offset="1" stop-color="#FF6A5E"/></linearGradient>
    <linearGradient id="spurple" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7C3AED"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
    <radialGradient id="sglow1" cx=".2" cy=".5" r=".6"><stop offset="0" stop-color="#9BCBFF" stop-opacity=".15"/><stop offset="1" stop-color="#9BCBFF" stop-opacity="0"/></radialGradient>
    <radialGradient id="sglow2" cx=".8" cy=".5" r=".6"><stop offset="0" stop-color="#FF9C97" stop-opacity=".12"/><stop offset="1" stop-color="#FF9C97" stop-opacity="0"/></radialGradient>
    <filter id="sshadow" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#93A9C2" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1400" height="700" rx="28" fill="url(#sbg)"/>
  <rect width="1400" height="700" rx="28" fill="url(#sglow1)"/>
  <rect width="1400" height="700" rx="28" fill="url(#sglow2)"/>
  <g filter="url(#sshadow)"><rect x="30" y="24" width="1340" height="652" rx="26" fill="url(#spanel)" stroke="#DCE7F4"/></g>

  <text x="70" y="72" fill="#0F172A" font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="700">Dual SDK Architecture / 双 SDK 混合架构</text>
  <text x="70" y="100" fill="#506178" font-family="Arial,Helvetica,sans-serif" font-size="17">Best-of-both: Claude for code operations, OpenAI for orchestration and review</text>

  <!-- Center: Python Orchestration Layer -->
  <rect x="520" y="130" width="360" height="520" rx="22" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="520" y="130" width="360" height="8" rx="4" fill="url(#spurple)"/>
  <text x="700" y="168" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" text-anchor="middle">Python 编排层</text>
  <text x="700" y="190" fill="#7C3AED" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">asyncio + State Machine + Human Review</text>

  <!-- Orchestration internals -->
  <rect x="548" y="210" width="304" height="44" rx="12" fill="#FFF" stroke="#DDD6FE"/>
  <text x="700" y="238" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Pipeline State Machine</text>

  <rect x="548" y="266" width="148" height="40" rx="10" fill="#FFF" stroke="#DDD6FE"/>
  <text x="622" y="291" fill="#6D28D9" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">Human Gate Svc</text>

  <rect x="704" y="266" width="148" height="40" rx="10" fill="#FFF" stroke="#DDD6FE"/>
  <text x="778" y="291" fill="#6D28D9" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">Audit Logger</text>

  <rect x="548" y="318" width="148" height="40" rx="10" fill="#FFF" stroke="#DDD6FE"/>
  <text x="622" y="343" fill="#6D28D9" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">Session Store</text>

  <rect x="704" y="318" width="148" height="40" rx="10" fill="#FFF" stroke="#DDD6FE"/>
  <text x="778" y="343" fill="#6D28D9" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">Resource Scheduler</text>

  <!-- Data contracts in center -->
  <text x="700" y="390" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Pydantic Data Contracts</text>
  <rect x="548" y="402" width="304" height="30" rx="8" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="700" y="422" fill="#6D28D9" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">ExplorationResult → ExecutionPlan → DevelopmentResult</text>
  <rect x="548" y="440" width="304" height="30" rx="8" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="700" y="460" fill="#6D28D9" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">ReviewVerdict → TestResult → ContributionArtifact</text>

  <!-- Communication protocol labels -->
  <text x="700" y="510" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600" text-anchor="middle">JSON Serialization</text>
  <rect x="580" y="520" width="240" height="24" rx="6" fill="#EDE9FE"/>
  <text x="700" y="537" fill="#7C3AED" font-family="Arial,Helvetica,sans-serif" font-size="11" text-anchor="middle">model.model_dump_json() ↔ parse_structured_output()</text>

  <!-- Principle labels -->
  <rect x="548" y="560" width="304" height="70" rx="14" fill="#FFF" stroke="#DDD6FE"/>
  <text x="700" y="584" fill="#5B21B6" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" text-anchor="middle">选型原则 / Selection Principle</text>
  <text x="700" y="604" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">需要文件操作 → Claude SDK</text>
  <text x="700" y="620" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12" text-anchor="middle">纯推理决策 → OpenAI SDK</text>

  <!-- LEFT: OpenAI Agents SDK -->
  <rect x="56" y="130" width="440" height="520" rx="22" fill="#F0F7FF" stroke="#BFDBFE" stroke-width="2"/>
  <rect x="56" y="130" width="440" height="8" rx="4" fill="url(#sblue)"/>
  <text x="276" y="168" fill="#1D4ED8" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" text-anchor="middle">OpenAI Agents SDK</text>
  <text x="276" y="190" fill="#3B82F6" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">Library-native · HTTP API · Lightweight</text>

  <!-- Explorer Agent -->
  <rect x="80" y="210" width="392" height="110" rx="18" fill="#FFF" stroke="#D0E2FF"/>
  <circle cx="118" cy="248" r="18" fill="#EEF5FF" stroke="#93C5FD"/>
  <text x="112" y="254" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">E</text>
  <text x="148" y="248" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">Explorer Agent · 探索 Agent</text>
  <text x="148" y="268" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">GPT-4o · Handoff 编排 · Guardrails · Tracing</text>
  <text x="100" y="296" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">子Agent: mail_scanner / code_analyzer / feasibility_checker</text>

  <!-- Planner Agent -->
  <rect x="80" y="334" width="392" height="100" rx="18" fill="#FFF" stroke="#D0E2FF"/>
  <circle cx="118" cy="370" r="18" fill="#EEF5FF" stroke="#93C5FD"/>
  <text x="113" y="376" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">P</text>
  <text x="148" y="370" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">Planner Agent · 规划 Agent</text>
  <text x="148" y="390" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">o3-mini · 结构化输出 · Guardrails</text>
  <text x="100" y="418" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">子Agent: dev_planner / test_planner</text>

  <!-- Reviewer Agent -->
  <rect x="80" y="448" width="392" height="100" rx="18" fill="#FFF" stroke="#D0E2FF"/>
  <circle cx="118" cy="484" r="18" fill="#EEF5FF" stroke="#93C5FD"/>
  <text x="113" y="490" fill="#2563EB" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">R</text>
  <text x="148" y="484" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">Reviewer Agent · 审核 Agent</text>
  <text x="148" y="504" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">Codex / GPT-4o · Handoff 分发 · Guardrails</text>
  <text x="100" y="532" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">子Agent: security / correctness / style reviewer</text>

  <!-- Key features box -->
  <rect x="80" y="562" width="392" height="68" rx="14" fill="#EEF5FF" stroke="#BFDBFE"/>
  <text x="100" y="584" fill="#1D4ED8" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600">Key: Handoff 编排 · Guardrails 校验 · Tracing 追踪</text>
  <text x="100" y="602" fill="#3B82F6" font-family="Arial,Helvetica,sans-serif" font-size="12">Custom Model Provider · 结构化输出 · 输入/输出过滤</text>
  <text x="100" y="620" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">适合: 信息检索、结构化分析、多维度审查</text>

  <!-- RIGHT: Claude Agent SDK -->
  <rect x="904" y="130" width="440" height="520" rx="22" fill="#FFF5F4" stroke="#FECACA" stroke-width="2"/>
  <rect x="904" y="130" width="440" height="8" rx="4" fill="url(#sred)"/>
  <text x="1124" y="168" fill="#B91C1C" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" text-anchor="middle">Claude Agent SDK</text>
  <text x="1124" y="190" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="13" text-anchor="middle">Subprocess model · stdin/stdout JSON · Built-in tools</text>

  <!-- Developer Agent -->
  <rect x="928" y="210" width="392" height="160" rx="18" fill="#FFF" stroke="#FFD6D1"/>
  <circle cx="966" cy="248" r="18" fill="#FFF1EF" stroke="#FFD2CC"/>
  <text x="959" y="254" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">D</text>
  <text x="996" y="248" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">Developer Agent · 开发 Agent</text>
  <text x="996" y="268" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">Claude Opus 4.6 · 最强代码生成</text>
  <text x="948" y="296" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">内置工具: Read / Write / Edit / Bash / Grep / Glob</text>
  <text x="948" y="316" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">MCP 自定义工具 · can_use_tool 审批回调</text>
  <text x="948" y="336" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">Thinking 模式 · 会话持久化 · Git 操作</text>
  <text x="948" y="356" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600">核心: 代码操作能力无出其右</text>

  <!-- Tester Agent -->
  <rect x="928" y="388" width="392" height="160" rx="18" fill="#FFF" stroke="#FFD6D1"/>
  <circle cx="966" cy="426" r="18" fill="#FFF1EF" stroke="#FFD2CC"/>
  <text x="960" y="432" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">T</text>
  <text x="996" y="426" fill="#1E2F47" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700">Tester Agent · 测试 Agent</text>
  <text x="996" y="446" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">Claude Sonnet 4.6 · 性价比最优</text>
  <text x="948" y="474" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">Bash 执行测试 · Read 解析结果 · 日志收集</text>
  <text x="948" y="494" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">QEMU RISC-V 仿真 · 交叉编译验证</text>
  <text x="948" y="514" fill="#8B9BB5" font-family="Arial,Helvetica,sans-serif" font-size="12">沙箱隔离 (filesystem + network)</text>
  <text x="948" y="534" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600">核心: 环境搭建 + 测试执行一体化</text>

  <!-- Key features box -->
  <rect x="928" y="562" width="392" height="68" rx="14" fill="#FFF1EF" stroke="#FECACA"/>
  <text x="948" y="584" fill="#B91C1C" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="600">Key: 内置工具集 · MCP 原生支持 · 沙箱隔离</text>
  <text x="948" y="602" fill="#D9483B" font-family="Arial,Helvetica,sans-serif" font-size="12">SessionStore 持久化 · can_use_tool 权限控制</text>
  <text x="948" y="620" fill="#607189" font-family="Arial,Helvetica,sans-serif" font-size="12">适合: 文件操作、代码生成、终端执行、Git 操作</text>

  <!-- Arrows from left to center -->
  <path d="M496 265H520" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <polygon points="516,259 528,265 516,271" fill="#3B82F6"/>
  <path d="M496 384H520" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <polygon points="516,378 528,384 516,390" fill="#3B82F6"/>
  <path d="M496 498H520" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  <polygon points="516,492 528,498 516,504" fill="#3B82F6"/>

  <!-- Arrows from center to right -->
  <path d="M880 290H904" stroke="#D9483B" stroke-width="4" stroke-linecap="round"/>
  <polygon points="900,284 912,290 900,296" fill="#D9483B"/>
  <path d="M880 468H904" stroke="#D9483B" stroke-width="4" stroke-linecap="round"/>
  <polygon points="900,462 912,468 900,474" fill="#D9483B"/>
</svg>