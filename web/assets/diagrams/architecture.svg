  <circle cx="150" cy="344" r="28" fill="#FFF1EF" stroke="#FFD2CC"/>
  <path d="M137 344H163" stroke="#D9483B" stroke-width="4" stroke-linecap="round"/>
  <path d="M150 331V357" stroke="#D9483B" stroke-width="4" stroke-linecap="round"/>
