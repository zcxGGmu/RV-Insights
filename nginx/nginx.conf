worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # SSE and proxy settings for backend API
  upstream backend {
    server backend:8000;
  }

  server {
    listen 80;
    server_name _;

    # Proxying API and health checks to backend
    location /api/ {
      proxy_pass http://backend/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;
    }

    location /health {
      proxy_pass http://backend/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
      proxy_buffering off;
      proxy_cache off;
    }

    # Static content or frontend dev server proxy
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ =404;
      # If you run a frontend dev server locally, you can proxy to it instead:
      # proxy_pass http://localhost:3000;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/event-stream;
  }
}
